name: Hoursapp
options:
  bundleIdPrefix: com.mikko
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.16
targets:
  Hoursapp:
    type: application
    platform: macOS
    sources:
      - path: Hoursapp
    resources:
      - path: Hoursapp/Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB
      - package: ZIPFoundation
        product: ZIPFoundation
    info:
      path: Hoursapp/Info.plist
      properties:
        CFBundleName: Hoursapp
        CFBundleDisplayName: Hoursapp
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: Hoursapp/Hoursapp.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikko.hoursapp
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
  HoursappTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HoursappTests
    dependencies:
      - target: Hoursapp
      - package: GRDB
        product: GRDB
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikko.hoursapp.tests
        GENERATE_INFOPLIST_FILE: YES
